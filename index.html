<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SyncScan - Modern Attendance System</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- HTML5 QR Code Scanner -->
    <script src="https://unpkg.com/html5-qrcode"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
                    animation: {
                        'pop-in': 'popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
                        'slide-up': 'slideUp 0.3s ease-out forwards',
                        'fade-in': 'fadeIn 0.2s ease-out forwards',
                    },
                    keyframes: {
                        popIn: {
                            '0%': { transform: 'scale(0.8)', opacity: '0' },
                            '100%': { transform: 'scale(1)', opacity: '1' },
                        },
                        slideUp: {
                            '0%': { transform: 'translateY(20px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        },
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { -webkit-tap-highlight-color: transparent; }
        .view-section { display: none; }
        .view-section.active { display: block; animation: fadeIn 0.3s ease-out; }
        #reader { border: none !important; background: transparent; }
        #reader__dashboard_section_swaplink { color: #6366f1 !important; text-decoration: none; font-weight: 600; }
        #reader button { background: #4f46e5 !important; color: white !important; border: none !important; border-radius: 0.75rem !important; padding: 0.6rem 1.2rem !important; font-weight: 600 !important; cursor: pointer; }
        #toast-container { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 0.5rem; width: 90%; max-width: 400px; pointer-events: none; }
        .toast { pointer-events: auto; padding: 1rem 1.25rem; border-radius: 1rem; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); display: flex; align-items: center; gap: 0.75rem; font-weight: 500; animation: slideUp 0.3s ease-out forwards; }
        .toast.success { background: #10b981; color: white; }
        .toast.error { background: #ef4444; color: white; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col">

    <div id="toast-container"></div>

    <!-- INITIALIZING OVERLAY -->
    <div id="loading-view" class="fixed inset-0 z-[100] bg-white flex flex-col items-center justify-center">
        <div class="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="text-slate-500 font-semibold animate-pulse">Initializing System...</p>
    </div>

    <!-- MAIN HEADER -->
    <header id="main-header" class="hidden bg-white/80 backdrop-blur-md shadow-sm border-b border-slate-200 px-6 py-4 flex items-center justify-between sticky top-0 z-20">
        <div class="flex items-center gap-2 text-indigo-600 font-bold text-xl">
            <div class="bg-indigo-600 text-white p-1.5 rounded-lg"><i class="ph ph-qr-code text-xl"></i></div>
            <span>SyncScan</span>
        </div>
        <div class="flex items-center gap-4">
            <div class="text-right hidden sm:block">
                <p id="nav-username" class="text-sm font-bold leading-none">User</p>
                <p id="nav-role" class="text-[10px] text-slate-400 uppercase font-bold tracking-widest mt-1">Role</p>
            </div>
            <button onclick="logout()" class="p-2 text-slate-400 hover:text-red-500 transition-colors">
                <i class="ph ph-sign-out text-2xl"></i>
            </button>
        </div>
    </header>

    <main class="flex-1 p-4 max-w-lg mx-auto w-full">
        <!-- LOGIN VIEW -->
        <section id="login-view" class="view-section pt-12">
            <div class="text-center mb-10">
                <h1 class="text-3xl font-black text-slate-900 mb-2">Welcome Back</h1>
                <p class="text-slate-500">Sign in to start scanning</p>
            </div>
            <form onsubmit="handleLogin(event)" class="space-y-4">
                <input type="text" id="login-user" placeholder="Username" required class="w-full p-4 rounded-2xl bg-white border border-slate-200 focus:border-indigo-500 outline-none transition-all">
                <input type="password" id="login-pass" placeholder="Password" required class="w-full p-4 rounded-2xl bg-white border border-slate-200 focus:border-indigo-500 outline-none transition-all">
                <button type="submit" class="w-full py-4 bg-indigo-600 text-white font-bold rounded-2xl shadow-lg shadow-indigo-100 active:scale-95 transition-all">Sign In</button>
            </form>
        </section>

        <!-- SCANNER VIEW -->
        <section id="scanner-view" class="view-section space-y-6">
            <div class="bg-slate-900 rounded-[2.5rem] p-4 shadow-2xl overflow-hidden aspect-square flex items-center justify-center">
                <div id="reader" class="w-full"></div>
            </div>
            <div id="scan-feedback" class="bg-white p-6 rounded-3xl border border-slate-100 text-center shadow-sm min-h-[120px] flex flex-col justify-center">
                <p class="text-slate-400 font-medium">Ready to scan QR codes</p>
            </div>
        </section>

        <!-- ADMIN VIEW -->
        <section id="admin-view" class="view-section space-y-6">
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                    <p class="text-xs font-bold text-slate-400 uppercase mb-1">Registered</p>
                    <p id="stat-total" class="text-3xl font-black">0</p>
                </div>
                <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                    <p class="text-xs font-bold text-slate-400 uppercase mb-1">Today</p>
                    <p id="stat-today" class="text-3xl font-black">0</p>
                </div>
            </div>
            <div class="bg-white rounded-3xl border border-slate-100 shadow-sm overflow-hidden">
                <div class="p-4 border-b border-slate-50 bg-slate-50/50">
                    <h3 class="font-bold text-slate-800">Recent Activity</h3>
                </div>
                <div id="activity-list" class="divide-y divide-slate-50 max-h-80 overflow-y-auto"></div>
            </div>
        </section>
    </main>

    <!-- NAVIGATION -->
    <nav id="bottom-nav" class="hidden fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t border-slate-200 px-6 py-3 z-30">
        <div class="max-w-lg mx-auto flex justify-around">
            <button onclick="switchView('scanner-view')" id="nav-scan" class="flex flex-col items-center gap-1 text-indigo-600">
                <i class="ph-fill ph-qr-code text-2xl"></i>
                <span class="text-[10px] font-bold uppercase tracking-widest">Scan</span>
            </button>
            <button onclick="switchView('admin-view')" id="nav-admin" class="flex flex-col items-center gap-1 text-slate-400">
                <i class="ph ph-chart-bar text-2xl"></i>
                <span class="text-[10px] font-bold uppercase tracking-widest">Admin</span>
            </button>
        </div>
    </nav>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbxs_PujU5Dz0FGVqodwt5XXuvCfBBghi-AG31aRb-VcFz2Bn6YzG-4AbDFPiY_CkE0B/exec'; 

        let allUsers = [
            { userId: 'GUEST-1234', name: 'Test Guest', username: 'test', role: 'admin' }
        ];
        let allLogs = [];
        let html5QrCode = null;
        let isProcessing = false;

        async function init() {
            try {
                const data = await apiCall('getState');
                if (data) {
                    allUsers = data.users || [];
                    allLogs = data.logs || [];
                }
            } catch (e) {
                console.warn("API Connection failed, using offline mode.");
            } finally {
                document.getElementById('loading-view').style.display = 'none';
                checkAuth();
            }
        }

        function checkAuth() {
            const user = JSON.parse(localStorage.getItem('syncscan_user'));
            if (!user) {
                switchView('login-view');
            } else {
                document.getElementById('main-header').classList.remove('hidden');
                document.getElementById('bottom-nav').classList.remove('hidden');
                document.getElementById('nav-username').innerText = user.name;
                document.getElementById('nav-role').innerText = user.role;
                if (user.role !== 'admin') document.getElementById('nav-admin').style.display = 'none';
                switchView('scanner-view');
            }
        }

        async function onScanSuccess(decodedText) {
            if (isProcessing) return;
            isProcessing = true;
            
            let idToFind = decodedText;
            if (decodedText.startsWith('http')) {
                try {
                    const url = new URL(decodedText);
                    idToFind = url.searchParams.get('id') || url.searchParams.get('guest') || idToFind;
                } catch(e) {}
            }

            const feedback = document.getElementById('scan-feedback');
            const user = allUsers.find(u => u.userId === idToFind);

            if (user) {
                feedback.innerHTML = `<div class="animate-pop-in"><h3 class="font-bold text-slate-900">${user.name}</h3><p class="text-green-600 font-bold uppercase text-xs">Logged</p></div>`;
                showToast(`Welcome, ${user.name}`, "success");
                // Match your Sheet headers: id, userId, type, status, message, timestamp
                await apiCall('addScan', { 
                    scan: {
                        userId: user.userId,
                        type: 'Entry',
                        status: 'Success',
                        message: `Checked in by ${JSON.parse(localStorage.getItem('syncscan_user')).name}`,
                        timestamp: new Date().toISOString()
                    }
                });
                // Refresh data to show in admin activity
                const data = await apiCall('getState');
                if(data) allLogs = data.logs || [];
            } else {
                feedback.innerHTML = `<div class="animate-pop-in"><h3 class="font-bold text-slate-900">Not Found</h3><p class="text-red-600 font-bold uppercase text-xs">ID: ${idToFind}</p></div>`;
                showToast("Unknown QR", "error");
            }

            setTimeout(() => {
                feedback.innerHTML = `<p class="text-slate-400 font-medium">Ready to scan next</p>`;
                isProcessing = false;
            }, 3000);
        }

        function switchView(viewId) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            if (viewId === 'scanner-view') startScanner(); else stopScanner();
            if (viewId === 'admin-view') renderAdmin();
        }

        function startScanner() {
            if (html5QrCode) return;
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, onScanSuccess)
                .catch(() => showToast("Camera Error", "error"));
        }

        function stopScanner() {
            if (html5QrCode) html5QrCode.stop().then(() => html5QrCode = null);
        }

        async function apiCall(action, payload = {}) {
            try {
                // If fetching state, use GET to simplify
                const url = action === 'getState' ? `${API_URL}?action=getState` : API_URL;
                const options = action === 'getState' ? {} : {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ action, ...payload })
                };
                const res = await fetch(url, options);
                if (action === 'getState') return await res.json();
                return { success: true };
            } catch (e) { throw e; }
        }

        function renderAdmin() {
            document.getElementById('stat-total').innerText = allUsers.length;
            const today = new Date().toLocaleDateString();
            const todayLogs = allLogs.filter(l => new Date(l.timestamp).toLocaleDateString() === today);
            document.getElementById('stat-today').innerText = todayLogs.length;

            const list = document.getElementById('activity-list');
            list.innerHTML = allLogs.slice().reverse().map(log => {
                const u = allUsers.find(user => user.userId === log.userId) || { name: log.userId };
                return `
                <div class="p-4 flex items-center justify-between">
                    <div>
                        <p class="font-bold text-sm text-slate-800">${u.name}</p>
                        <p class="text-[10px] text-slate-400 uppercase font-bold">${new Date(log.timestamp).toLocaleTimeString()}</p>
                    </div>
                    <span class="bg-green-50 text-green-600 text-[10px] font-black px-2 py-1 rounded uppercase tracking-widest">${log.type}</span>
                </div>`;
            }).join('');
        }

        function handleLogin(e) {
            e.preventDefault();
            const u = document.getElementById('login-user').value;
            const user = allUsers.find(user => user.username === u || user.userId === u);
            if (user) {
                localStorage.setItem('syncscan_user', JSON.stringify(user));
                location.reload();
            } else {
                showToast("Invalid Credentials", "error");
            }
        }

        function logout() {
            localStorage.removeItem('syncscan_user');
            location.reload();
        }

        function showToast(msg, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type === 'success' ? 'success' : 'error'}`;
            toast.innerText = msg;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        window.onload = init;
    </script>
</body>
</html>
